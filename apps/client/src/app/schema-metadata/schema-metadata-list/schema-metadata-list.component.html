<div fxLayout="row" fxLayoutAlign="space-between center">
  <h2>Schema Metadata</h2>
  <div fxLayout="row" fxLayoutGap="8px">
    <button matIconButton [routerLink]="['create']" matTooltip="Submit signed schema metadata">
      <mat-icon>add</mat-icon>
    </button>
  </div>
</div>

@if (loading) {
  <p>Loading schema metadata...</p>
} @else if (items.length === 0) {
  <p>No schema metadata found.</p>
} @else {
  <table mat-table [dataSource]="items" class="mat-elevation-z8">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let item">{{ item.id }}</td>
    </ng-container>

    <ng-container matColumnDef="version">
      <th mat-header-cell *matHeaderCellDef>Version</th>
      <td mat-cell *matCellDef="let item">{{ item.version }}</td>
    </ng-container>

    <ng-container matColumnDef="issuer">
      <th mat-header-cell *matHeaderCellDef>Issuer</th>
      <td mat-cell *matCellDef="let item">{{ item.issuer }}</td>
    </ng-container>

    <ng-container matColumnDef="updatedAt">
      <th mat-header-cell *matHeaderCellDef>Updated</th>
      <td mat-cell *matCellDef="let item">{{ item.updatedAt | date: 'medium' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        <button matIconButton [routerLink]="[item.id]" matTooltip="View details">
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
