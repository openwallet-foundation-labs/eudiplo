version: 2

updates:
  # --- JS/TS deps across the pnpm monorepo ---
  - package-ecosystem: npm
    directory: "/"                     # scans all package.json + pnpm-lock.yaml
    schedule:
      interval: weekly
      day: tuesday
      time: "05:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 8
    commit-message:
      prefix: "deps"
      include: "scope"
    versioning-strategy: increase-if-necessary
    labels: ["dependencies", "pnpm", "javascript"]

    # Ignore internal workspace packages (Dependabot doesn't support workspace: protocol)
    ignore:
      - dependency-name: "@eudiplo/*"

    groups:
      # All minor/patch updates bundled together
      all-minor-patch:
        update-types: ["minor", "patch"]

      # Major updates are NOT grouped - each gets its own PR
      # to allow individual review and handling of breaking changes

  # --- GitHub Actions versions in .github/workflows ---
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: wednesday
      time: "05:30"
      timezone: "Europe/Berlin"
    labels: ["dependencies", "github-actions"]

  # --- Docker base images (adjust directory if Dockerfiles live elsewhere) ---
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
      time: "06:00"
      timezone: "Europe/Berlin"
    labels: ["dependencies", "docker"]
