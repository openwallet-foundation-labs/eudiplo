services:
  eudiplo:
    image: ghcr.io/openwallet-foundation/eudiplo:latest
    restart: always
    build:
      target: eudiplo
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - ./assets:/app/config
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  eudiplo-client:
    image: ghcr.io/openwallet-foundation/eudiplo-client:latest
    restart: always
    build:
      target: client
    ports:
      - '4200:8080'
    depends_on:
      eudiplo:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://eudiplo:3000
      # Uncomment to serve the client from a subpath behind a reverse proxy:
      # - CLIENT_BASE_HREF=/eudiplo-client/
    healthcheck:
      test: ['CMD', 'wget', '-qO', '/dev/null', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
