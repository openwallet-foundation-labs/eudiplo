global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  # Scrape metrics from the OpenTelemetry Collector
  # The collector receives OTLP from the backend and exposes /metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 30s
    scrape_timeout: 10s

