groups:
  - name: eudiplo.rules
    rules:
      # High HTTP Error Rate (5xx responses)
      - alert: HighErrorRate
        expr: sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) > 0.1
        for: 2m
        labels:
          severity: warning
          service: eudiplo
        annotations:
          summary: "High HTTP error rate detected"
          description: "5xx error rate is {{ $value }} requests per second"

      # Service Down Alert (OTel Collector not reachable)
      - alert: ServiceDown
        expr: up{job=~"otel-collector.*"} == 0
        for: 1m
        labels:
          severity: critical
          service: eudiplo
        annotations:
          summary: "EUDIPLO telemetry pipeline is down"
          description: "OTel Collector has been unreachable for more than 1 minute"

      # High Response Time (95th percentile)
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          service: eudiplo
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s"

      # High Memory Usage (if host metrics are available)
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: eudiplo
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%"

  - name: tenant.rules
    rules:
      # Per-tenant active sessions
      - record: tenant:active_sessions
        expr: sessions{status="active"}
