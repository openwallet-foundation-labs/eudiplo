services:
  # ── OpenTelemetry Collector ────────────────────────────────────────
  # Central hub for all telemetry signals (metrics, traces, logs).
  # The backend exports OTLP to this collector, which fans out to backends.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: always
    container_name: otel-collector
    ports:
      - '4317:4317' # OTLP gRPC (for containerized services)
      - '4318:4318' # OTLP HTTP (for local dev)
      - '8889:8889' # Prometheus metrics (scraped by Prometheus)
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - monitoring
    depends_on:
      - tempo
      - loki

  # ── Tempo (Traces) ────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.7.2
    restart: always
    container_name: tempo
    ports:
      - '3200:3200' # Tempo query API
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command: ['-config.file=/etc/tempo/tempo.yml']
    networks:
      - monitoring

  # ── Loki (Logs) ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    restart: always
    container_name: loki
    ports:
      - '3100:3100'
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: ['-config.file=/etc/loki/loki.yml']
    networks:
      - monitoring

  # ── Prometheus (Metrics) ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: always
    container_name: prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.enable-remote-write-receiver'
    networks:
      - monitoring
    depends_on:
      - otel-collector

  # ── Grafana (Dashboards) ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: always
    container_name: grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/custom.ini:/etc/grafana/grafana.ini:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
      - tempo
      - loki

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data:
